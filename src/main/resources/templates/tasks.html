<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title> ToDo Application </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <style>
         .text-strikethrough{
         text-decoration: line-through;
         color:blue;
         }
     </style>
</head>
<body>
<div class = "container">
<h1 class="mt-3 text-center"> ToDo Application </h1>

    <form action= "/" method ="post" class = "row mt-3">
        <div class =" col-md-12 ">
            <input class = "from-control from-control-lg " type="text"  name="tittle" placeholder="Add a new Task.... !!" required>
        </div>
        <div>
            <button type="submit" class = " btn btn-primary btn-lg btn-block">Add</button>
        </div>
    </form>
    <div class = " mt-4">
    <th:block th:each="task : ${tasks}">
        <div class = "card mb-2">
            <div class = "card-body d-flex justify-content-between align-items-center ">
           <span th:classappend="${task.completed} ? 'text-decoration-line-through' : ''"
                 th:text="${task.tittle}">Task Tittle
</span>
                <div>
                    <a th:href="@{/{id}/toggle(id=${task.id})}" class=" btn btn-outline-secondary btn-sm ">Toggle</a>
                    <a th:href="@{/{id}/delete(id=${task.id})}" class=" btn btn-outline-danger btn-sm ml-2 ">Delete</a>
                </div>
            </div>
        </div>
    </th:block>
        </div>
</div>
</body>
</html>
